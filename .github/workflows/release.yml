name: Release

on:
  push:
    tags:
      - “v*”

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: “1.26”
      - name: Install Wails Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev libsoup-3.0-dev
      - run: go install github.com/go-task/task/v3/cmd/task@latest
      - run: task test

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: “1.26”
      - uses: actions/setup-node@v4
        with:
          node-version: “22”
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: go-tools-wails3-${{ runner.os }}-${{ hashFiles('go.sum') }}
      - run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest
      - run: go install github.com/go-task/task/v3/cmd/task@latest
      - run: task package:windows
      - uses: actions/upload-artifact@v4
        with:
          name: Nearfy-windows-amd64
          path: build/bin/Nearfy-windows-amd64.exe

  build-macos:
    needs: test
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: “1.26”
      - uses: actions/setup-node@v4
        with:
          node-version: “22”
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: go-tools-wails3-${{ runner.os }}-${{ hashFiles('go.sum') }}
      - run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest
      - run: go install github.com/go-task/task/v3/cmd/task@latest
      - run: task package:darwin
      - name: Create macOS .dmg
        run: |
          mkdir -p /tmp/dmg-content
          cp -R build/bin/Nearfy.app /tmp/dmg-content/
          ln -s /Applications /tmp/dmg-content/Applications
          hdiutil create -volname “Nearfy” -srcfolder /tmp/dmg-content -ov -format UDZO build/bin/Nearfy-macos.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: Nearfy-macos
          path: build/bin/Nearfy-macos.dmg

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: List artifacts
        run: find artifacts -type f | sort
      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -z “$PREV_TAG” ]; then
            RANGE=”HEAD”
          else
            RANGE=”$PREV_TAG..HEAD”
          fi

          NL=$(printf '\n')
          BL=$(printf '\n\n')

          NOTES=”## ✨ 新功能${BL}”
          FEATS=$(git log “$RANGE” --format=”- %s” --grep=”^feat” -i || true)
          if [ -n “$FEATS” ]; then
            NOTES=”${NOTES}${FEATS}${BL}”
          fi

          NOTES=”${NOTES}## 🐛 修复${BL}”
          FIXES=$(git log “$RANGE” --format=”- %s” --grep=”^fix” -i || true)
          if [ -n “$FIXES” ]; then
            NOTES=”${NOTES}${FIXES}${BL}”
          fi

          NOTES=”${NOTES}## 📦 下载${BL}”
          NOTES=”${NOTES}| 平台 | 文件 |${NL}”
          NOTES=”${NOTES}|------|------|${NL}”
          NOTES=”${NOTES}| macOS | \`Nearfy-macos.dmg\` |${NL}”
          NOTES=”${NOTES}| Windows | \`Nearfy-windows-amd64.exe\` |${BL}”
          NOTES=”${NOTES}## 💻 macOS 使用说明${BL}”
          NOTES=”${NOTES}双击打开 .dmg 文件，将 Nearfy 拖入 Applications 文件夹即可。${NL}”
          NOTES=”${NOTES}如果提示”无法打开”或”已损坏”，请在终端执行：${BL}”
          NOTES=”${NOTES}\`\`\`bash${NL}”
          NOTES=”${NOTES}xattr -cr /path/to/Nearfy.app${NL}”
          NOTES=”${NOTES}\`\`\`${BL}”
          NOTES=”${NOTES}然后即可正常双击打开。${NL}”

          {
            echo “body<<RELEASEEOF”
            echo “$NOTES”
            echo “RELEASEEOF”
          } >> “$GITHUB_OUTPUT”

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.body }}
          files: |
            artifacts/Nearfy-windows-amd64/*.exe
            artifacts/Nearfy-macos/*.dmg
