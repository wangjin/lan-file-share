name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: go install github.com/go-task/task/v3/cmd/task@latest
      - run: task test

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest
      - run: go install github.com/go-task/task/v3/cmd/task@latest
      - run: task package:windows
      - uses: actions/upload-artifact@v4
        with:
          name: lan-file-share-windows-amd64
          path: build/bin/lan-file-share-windows-amd64.exe

  build-macos:
    needs: test
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest
      - run: go install github.com/go-task/task/v3/cmd/task@latest
      - name: Generate macOS icon
        run: |
          mkdir -p /tmp/icon.iconset
          sips -z 16 16 frontend/src/assets/images/logo.png --out /tmp/icon.iconset/icon_16x16.png
          sips -z 32 32 frontend/src/assets/images/logo.png --out /tmp/icon.iconset/icon_16x16@2x.png
          sips -z 32 32 frontend/src/assets/images/logo.png --out /tmp/icon.iconset/icon_32x32.png
          sips -z 64 64 frontend/src/assets/images/logo.png --out /tmp/icon.iconset/icon_32x32@2x.png
          sips -z 128 128 frontend/src/assets/images/logo.png --out /tmp/icon.iconset/icon_128x128.png
          sips -z 256 256 frontend/src/assets/images/logo.png --out /tmp/icon.iconset/icon_128x128@2x.png
          sips -z 256 256 frontend/src/assets/images/logo.png --out /tmp/icon.iconset/icon_256x256.png
          sips -z 512 512 frontend/src/assets/images/logo.png --out /tmp/icon.iconset/icon_256x256@2x.png
          sips -z 512 512 frontend/src/assets/images/logo.png --out /tmp/icon.iconset/icon_512x512.png
          sips -z 1024 1024 frontend/src/assets/images/logo.png --out /tmp/icon.iconset/icon_512x512@2x.png
          iconutil -c icns /tmp/icon.iconset -o build/darwin/icons.icns
      - run: task package:darwin
      - name: Create macOS .dmg
        run: |
          mkdir -p /tmp/dmg-content
          cp -R build/bin/lan-file-share.app /tmp/dmg-content/
          ln -s /Applications /tmp/dmg-content/Applications
          hdiutil create -volname "LAN File Share" -srcfolder /tmp/dmg-content -ov -format UDZO build/bin/lan-file-share-macos.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: lan-file-share-macos
          path: build/bin/lan-file-share-macos.dmg

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: List artifacts
        run: find artifacts -type f | sort
      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="$PREV_TAG..HEAD"
          fi

          {
            echo "body<<EOF"

            FEATS=$(git log "$RANGE" --format="- %s" --grep="^feat" -i || true)
            if [ -n "$FEATS" ]; then
              echo "## ✨ 新功能"
              echo "$FEATS"
              echo ""
            fi

            FIXES=$(git log "$RANGE" --format="- %s" --grep="^fix" -i || true)
            if [ -n "$FIXES" ]; then
              echo "## 🐛 修复"
              echo "$FIXES"
              echo ""
            fi

            echo "## 📦 下载"
            echo "| 平台 | 文件 |"
            echo "|------|------|"
            echo "| macOS | \`lan-file-share-macos.dmg\` |"
            echo "| Windows | \`lan-file-share-windows-amd64.exe\` |"
            echo ""

            echo "## 💻 macOS 使用说明"
            echo "双击打开 .dmg 文件，将 LAN File Share 拖入 Applications 文件夹即可。"
            echo "如果提示\"无法打开\"或\"已损坏\"，请在终端执行："
            echo '```bash'
            echo "xattr -cr /path/to/lan-file-share.app"
            echo '```"
            echo "然后即可正常双击打开。"

            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.body }}
          files: |
            artifacts/lan-file-share-windows-amd64/*.exe
            artifacts/lan-file-share-macos/*.dmg
