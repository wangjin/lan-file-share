version: "3"

vars:
  APP_NAME: Nearfy
  FRONTEND_DIR: frontend
  BUILD_DIR: build/bin
  BINDINGS_DIR: frontend/bindings
  VERSION:
    sh: git describe --tags --always 2>/dev/null || echo "dev"

env:
  CGO_ENABLED: 1

tasks:
  # ===== Development =====
  dev:
    desc: Run in development mode with hot reload
    cmds:
      - wails3 dev

  # ===== Bindings =====
  generate:
    desc: Generate TypeScript bindings from Go services
    cmds:
      - wails3 generate bindings -ts -d {{.BINDINGS_DIR}} .
    sources:
      - "*.go"
      - internal/**/*.go
    generates:
      - "{{.BINDINGS_DIR}}/**/*.ts"

  # ===== Frontend =====
  frontend:install:
    desc: Install frontend dependencies
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - npm install
    sources:
      - package.json
      - package-lock.json
    generates:
      - node_modules/.package-lock.json

  frontend:build:
    desc: Build frontend assets
    deps: [frontend:install, generate]
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - npm run build
    sources:
      - src/**/*.{ts,tsx,css}
      - bindings/**/*.ts
      - index.html
      - vite.config.ts
      - tsconfig.json
    generates:
      - dist/index.html

  # ===== Build (binary only) =====
  build:darwin:amd64:
    desc: Build macOS amd64 binary
    deps: [frontend:build]
    cmds:
      - GOOS=darwin GOARCH=amd64 go build -ldflags "-X main.version={{.VERSION}}" -o {{.BUILD_DIR}}/{{.APP_NAME}}-darwin-amd64 .
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
      - frontend/dist/**/*
    generates:
      - "{{.BUILD_DIR}}/{{.APP_NAME}}-darwin-amd64"

  build:darwin:arm64:
    desc: Build macOS arm64 binary (Apple Silicon)
    deps: [frontend:build]
    cmds:
      - GOOS=darwin GOARCH=arm64 go build -ldflags "-X main.version={{.VERSION}}" -o {{.BUILD_DIR}}/{{.APP_NAME}}-darwin-arm64 .
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
      - frontend/dist/**/*
    generates:
      - "{{.BUILD_DIR}}/{{.APP_NAME}}-darwin-arm64"

  build:darwin:
    desc: Build macOS binary for current architecture
    deps: [frontend:build]
    cmds:
      - go build -ldflags "-X main.version={{.VERSION}}" -o {{.BUILD_DIR}}/{{.APP_NAME}} .
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
      - frontend/dist/**/*
    generates:
      - "{{.BUILD_DIR}}/{{.APP_NAME}}"

  build:windows:amd64:
    desc: Build Windows amd64 binary
    deps: [frontend:build]
    cmds:
      - GOOS=windows GOARCH=amd64 go build -ldflags "-H windowsgui -X main.version={{.VERSION}}" -o {{.BUILD_DIR}}/{{.APP_NAME}}-windows-amd64.exe .
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
      - frontend/dist/**/*
    generates:
      - "{{.BUILD_DIR}}/{{.APP_NAME}}-windows-amd64.exe"

  build:linux:amd64:
    desc: Build Linux amd64 binary
    deps: [frontend:build]
    cmds:
      - GOOS=linux GOARCH=amd64 go build -ldflags "-X main.version={{.VERSION}}" -o {{.BUILD_DIR}}/{{.APP_NAME}}-linux-amd64 .
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
      - frontend/dist/**/*
    generates:
      - "{{.BUILD_DIR}}/{{.APP_NAME}}-linux-amd64"

  build:linux:arm64:
    desc: Build Linux arm64 binary
    deps: [frontend:build]
    cmds:
      - GOOS=linux GOARCH=arm64 go build -ldflags "-X main.version={{.VERSION}}" -o {{.BUILD_DIR}}/{{.APP_NAME}}-linux-arm64 .
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
      - frontend/dist/**/*
    generates:
      - "{{.BUILD_DIR}}/{{.APP_NAME}}-linux-arm64"

  build:all:
    desc: Build binaries for all supported platforms
    cmds:
      - task: build:darwin:amd64
      - task: build:darwin:arm64
      - task: build:windows:amd64
      - task: build:linux:amd64
      - task: build:linux:arm64

  build:
    desc: Build binary for current platform
    deps: [frontend:build]
    cmds:
      - go build -ldflags "-X main.version={{.VERSION}}" -o {{.BUILD_DIR}}/{{.APP_NAME}} .

  # ===== macOS icon generation =====
  generate:darwin:icon:
    desc: Generate macOS .icns icon from logo.png
    internal: true
    cmds:
      - mkdir -p /tmp/nearfy-icon.iconset
      - sips -z 16 16 frontend/src/assets/images/logo.png --out /tmp/nearfy-icon.iconset/icon_16x16.png
      - sips -z 32 32 frontend/src/assets/images/logo.png --out /tmp/nearfy-icon.iconset/icon_16x16@2x.png
      - sips -z 32 32 frontend/src/assets/images/logo.png --out /tmp/nearfy-icon.iconset/icon_32x32.png
      - sips -z 64 64 frontend/src/assets/images/logo.png --out /tmp/nearfy-icon.iconset/icon_32x32@2x.png
      - sips -z 128 128 frontend/src/assets/images/logo.png --out /tmp/nearfy-icon.iconset/icon_128x128.png
      - sips -z 256 256 frontend/src/assets/images/logo.png --out /tmp/nearfy-icon.iconset/icon_128x128@2x.png
      - sips -z 256 256 frontend/src/assets/images/logo.png --out /tmp/nearfy-icon.iconset/icon_256x256.png
      - sips -z 512 512 frontend/src/assets/images/logo.png --out /tmp/nearfy-icon.iconset/icon_256x256@2x.png
      - sips -z 512 512 frontend/src/assets/images/logo.png --out /tmp/nearfy-icon.iconset/icon_512x512.png
      - sips -z 1024 1024 frontend/src/assets/images/logo.png --out /tmp/nearfy-icon.iconset/icon_512x512@2x.png
      - mkdir -p build/darwin
      - iconutil -c icns /tmp/nearfy-icon.iconset -o build/darwin/icons.icns
    sources:
      - frontend/src/assets/images/logo.png
    generates:
      - build/darwin/icons.icns
    status:
      - test -f build/darwin/icons.icns

  generate:darwin:plist:
    desc: Generate macOS Info.plist
    internal: true
    cmds:
      - mkdir -p build/darwin
      - |
        cat > build/darwin/Info.plist << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
          <key>CFBundleExecutable</key>
          <string>Nearfy</string>
          <key>CFBundleIdentifier</key>
          <string>com.ieemoo.nearfy</string>
          <key>CFBundleName</key>
          <string>Nearfy</string>
          <key>CFBundleDisplayName</key>
          <string>Nearfy</string>
          <key>CFBundleVersion</key>
          <string>{{.VERSION}}</string>
          <key>CFBundleShortVersionString</key>
          <string>{{.VERSION}}</string>
          <key>CFBundleIconFile</key>
          <string>icons</string>
          <key>CFBundlePackageType</key>
          <string>APPL</string>
          <key>LSMinimumSystemVersion</key>
          <string>11.0</string>
          <key>NSHighResolutionCapable</key>
          <true/>
        </dict>
        </plist>
        EOF
    generates:
      - build/darwin/Info.plist
    status:
      - test -f build/darwin/Info.plist

  # ===== Package (platform-native bundles) =====
  package:darwin:
    desc: Package macOS .app bundle for current architecture
    deps: [build:darwin, generate:darwin:icon, generate:darwin:plist]
    cmds:
      - mkdir -p {{.BUILD_DIR}}/{{.APP_NAME}}.app/Contents/{MacOS,Resources}
      - cp build/darwin/icons.icns {{.BUILD_DIR}}/{{.APP_NAME}}.app/Contents/Resources
      - cp {{.BUILD_DIR}}/{{.APP_NAME}} {{.BUILD_DIR}}/{{.APP_NAME}}.app/Contents/MacOS
      - cp build/darwin/Info.plist {{.BUILD_DIR}}/{{.APP_NAME}}.app/Contents
      - codesign --force --deep --sign - {{.BUILD_DIR}}/{{.APP_NAME}}.app
    sources:
      - build/darwin/icons.icns
      - build/darwin/Info.plist
      - "{{.BUILD_DIR}}/{{.APP_NAME}}"
    generates:
      - "{{.BUILD_DIR}}/{{.APP_NAME}}.app/Contents/MacOS/{{.APP_NAME}}"

  package:darwin:dmg:
    desc: Package macOS .dmg installer
    deps: [package:darwin]
    cmds:
      - mkdir -p /tmp/{{.APP_NAME}}-dmg
      - cp -R {{.BUILD_DIR}}/{{.APP_NAME}}.app /tmp/{{.APP_NAME}}-dmg/
      - ln -sf /Applications /tmp/{{.APP_NAME}}-dmg/Applications
      - hdiutil create -volname "Nearfy" -srcfolder /tmp/{{.APP_NAME}}-dmg -ov -format UDZO {{.BUILD_DIR}}/{{.APP_NAME}}-macos.dmg
    generates:
      - "{{.BUILD_DIR}}/{{.APP_NAME}}-macos.dmg"

  package:windows:
    desc: Package Windows amd64 executable with icon embedding
    deps: [build:windows:amd64]
    cmds:
      - echo "Windows binary built at {{.BUILD_DIR}}/{{.APP_NAME}}-windows-amd64.exe"

  package:linux:
    desc: Package Linux amd64 binary
    deps: [build:linux:amd64]
    cmds:
      - echo "Linux binary built at {{.BUILD_DIR}}/{{.APP_NAME}}-linux-amd64"

  package:
    desc: Package for current platform
    cmds:
      - task: package:{{OS}}

  # ===== Testing =====
  test:
    desc: Run Go tests
    cmds:
      - go test ./internal/... -v -race

  test:coverage:
    desc: Run Go tests with coverage report
    cmds:
      - go test ./internal/... -v -race -coverprofile=coverage.out
      - go tool cover -html=coverage.out -o coverage.html

  # ===== Cleanup =====
  clean:
    desc: Remove all build artifacts
    cmds:
      - rm -rf {{.BUILD_DIR}}
      - rm -rf {{.FRONTEND_DIR}}/dist
      - rm -rf {{.FRONTEND_DIR}}/node_modules
      - rm -rf coverage.out coverage.html

  # ===== Utilities =====
  lint:
    desc: Run Go linter
    cmds:
      - go vet ./...

  tidy:
    desc: Tidy Go modules
    cmds:
      - go mod tidy
